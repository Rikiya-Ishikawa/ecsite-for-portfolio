<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages Fragment</title>
</head>
<body>
<!-- メッセージの表示部分 -->
<div th:if="${param.error}" class="alert alert-danger mt-3">
    <strong>エラー!</strong> 認証に失敗しました。再度お試しください。
</div>

<div th:if="${param.success}" class="alert alert-success mt-3">
    <strong>成功!</strong> 操作が正常に完了しました。
</div>

<div th:if="${param.logout}" class="alert alert-success mt-3">
    <strong>成功!</strong> ログアウトしました。
</div>

<!-- 他のメッセージの追加があればここに追加する -->
</body>
</html>
