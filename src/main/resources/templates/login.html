<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログインページ</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>

<body>
<div th:replace="fragments/header :: header"></div>
<div class="container">
    <h2 class="mt-5">ログイン</h2>
    <form action="/login" method="post" th:action="@{/login}" class="form-signin">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="パスワード" required>
        </div>
        <button type="submit" class="btn btn-primary">ログイン</button>
    </form>
</div>

<!-- エラーメッセージ表示 -->
<div th:if="${param.error}" class="alert alert-danger mt-3">
    <strong>エラー!</strong> ログインに失敗しました。メールアドレスまたはパスワードが間違っています。
</div>

<div th:if="${param.logout}" class="alert alert-success mt-3">
    <strong>成功!</strong> ログアウトしました。
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
